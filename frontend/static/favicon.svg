  <g fill="#e6f6ff">
    <circle cx="32" cy="6" r="3.4"/>
    <circle cx="55" cy="19" r="3.4"/>
    <circle cx="55" cy="45" r="3.4"/>
    <circle cx="32" cy="58" r="3.4"/>
    <circle cx="9" cy="45" r="3.4"/>
    <circle cx="9" cy="19" r="3.4"/>
    <circle cx="32" cy="32" r="4.0"/>
